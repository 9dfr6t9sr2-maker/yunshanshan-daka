<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>芸山杉 · 商家后台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f3ee;color:#2c2416;min-height:100vh}
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#f5f3ee;display:flex;align-items:center;justify-content:center;z-index:100}
.login-box{background:#fff;border-radius:14px;padding:40px 30px;width:90%;max-width:360px;box-shadow:0 4px 24px rgba(44,36,22,0.1);text-align:center}
.login-box h1{font-size:24px;margin-bottom:4px}
.login-box .sub{font-size:13px;color:#8a7e6e;margin-bottom:24px}
.login-box input{width:100%;padding:14px;border:2px solid #e8e2d6;border-radius:10px;font-size:16px;outline:none;text-align:center;margin-bottom:16px}
.login-box input:focus{border-color:#6b8a5e}
.login-box button{width:100%;padding:14px;background:#6b8a5e;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.login-box button:active{opacity:0.9}
.login-error{color:#c4645a;font-size:13px;margin-top:8px;display:none}
.header{background:#fff;padding:16px 20px;border-bottom:1px solid #e8e2d6;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header h1{font-size:18px}
.stats-bar{display:flex;gap:10px;padding:16px 20px}
.stat-card{flex:1;background:#fff;border-radius:12px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(44,36,22,0.04)}
.stat-card .num{font-size:28px;font-weight:800;color:#6b8a5e}
.stat-card .label{font-size:12px;color:#8a7e6e;margin-top:4px}
.stat-card.pending .num{color:#c4645a}
.controls{padding:0 20px 12px;display:flex;gap:8px}
.controls button{padding:8px 16px;border:1px solid #e8e2d6;border-radius:20px;background:#fff;font-size:13px;cursor:pointer;transition:all 0.2s}
.controls button.active{background:#6b8a5e;color:#fff;border-color:#6b8a5e}
.call-list{padding:0 20px 20px}
.call-item{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(44,36,22,0.04);display:flex;align-items:center;gap:14px}
.call-item.resolved{opacity:0.6}
.call-icon{font-size:28px;flex-shrink:0}
.call-info{flex:1}
.call-table{font-size:16px;font-weight:700}
.call-type{font-size:13px;color:#8a7e6e;margin-top:2px}
.call-time{font-size:12px;color:#c4bdb0;margin-top:2px}
.call-phone{font-size:12px;color:#8a7e6e}
.resolve-btn{padding:8px 16px;background:#6b8a5e;color:#fff;border:none;border-radius:20px;font-size:13px;cursor:pointer;flex-shrink:0}
.resolve-btn:active{opacity:0.8}
.resolve-btn:disabled{opacity:0.4;cursor:not-allowed}
.resolved-badge{font-size:12px;color:#6b8a5e;flex-shrink:0}
.empty{text-align:center;padding:60px 20px;color:#c4bdb0}
.empty .emoji{font-size:48px;margin-bottom:12px}
.auto-refresh{font-size:12px;color:#8a7e6e;padding:0 20px 16px}
</style>
</head>
<body>

<div class="login-overlay" id="login-screen">
  <div class="login-box">
    <h1>🔐 商家后台</h1>
    <div class="sub">芸山杉 · 出片计划</div>
    <input type="password" id="token-input" placeholder="请输入管理密码" autofocus>
    <button onclick="login()">进入后台</button>
    <div class="login-error" id="login-error">密码错误</div>
  </div>
</div>

<div id="main-screen" style="display:none">
  <div class="header">
    <h1>📋 芸山杉 · 商家后台</h1>
    <span style="font-size:12px;color:#8a7e6e" id="current-time"></span>
  </div>
  
  <div class="stats-bar">
    <div class="stat-card pending"><div class="num" id="stat-pending">0</div><div class="label">待处理</div></div>
    <div class="stat-card"><div class="num" id="stat-today">0</div><div class="label">今日呼叫</div></div>
    <div class="stat-card"><div class="num" id="stat-resolved">0</div><div class="label">已处理</div></div>
  </div>
  
  <div class="controls">
    <button class="active" onclick="filterCalls('all')" id="btn-all">全部</button>
    <button onclick="filterCalls('pending')" id="btn-pending">待处理</button>
    <button onclick="filterCalls('resolved')" id="btn-resolved">已处理</button>
  </div>
  
  <div class="auto-refresh">🔄 每10秒自动刷新</div>
  
  <div class="call-list" id="call-list">
    <div class="empty"><div class="emoji">☕</div>暂无呼叫记录</div>
  </div>
</div>

<script>
let TOKEN = '';
let currentFilter = 'all';
const API_BASE = '/api/daka/admin';

function login() {
  const token = document.getElementById('token-input').value.trim();
  if (!token) return;
  fetch(API_BASE + '/stats?token=' + encodeURIComponent(token))
    .then(r => {
      if (r.status === 401) { document.getElementById('login-error').style.display = 'block'; return; }
      return r.json();
    })
    .then(d => {
      if (!d) return;
      TOKEN = token;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-screen').style.display = 'block';
      loadData();
      setInterval(loadData, 10000);
      setInterval(() => {
        document.getElementById('current-time').textContent = new Date().toLocaleTimeString('zh-CN');
      }, 1000);
    });
}
document.getElementById('token-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

function filterCalls(f) {
  currentFilter = f;
  ['all','pending','resolved'].forEach(x => {
    document.getElementById('btn-' + x).classList.toggle('active', x === f);
  });
  loadCalls();
}

function loadData() { loadStats(); loadCalls(); }

function loadStats() {
  fetch(API_BASE + '/stats?token=' + TOKEN)
    .then(r => r.json()).then(d => {
      document.getElementById('stat-pending').textContent = d.pending;
      document.getElementById('stat-today').textContent = d.total_today;
      document.getElementById('stat-resolved').textContent = d.resolved_today;
    });
}

function loadCalls() {
  let url = API_BASE + '/calls?token=' + TOKEN;
  if (currentFilter !== 'all') url += '&status=' + currentFilter;
  fetch(url).then(r => r.json()).then(d => {
    const container = document.getElementById('call-list');
    if (!d.calls || d.calls.length === 0) {
      container.innerHTML = '<div class="empty"><div class="emoji">☕</div>暂无呼叫记录</div>';
      return;
    }
    container.innerHTML = d.calls.map(c => {
      const typeIcon = {dish:'🍽️',hygiene:'🧹',tea:'🍵',order:'📋',bill:'💰',other:'📞'}[c.call_type] || '🛎️';
      const isResolved = c.status === 'resolved';
      const time = c.timestamp ? new Date(c.timestamp).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) : '';
      return '<div class="call-item ' + (isResolved ? 'resolved' : '') + '">' +
        '<div class="call-icon">' + typeIcon + '</div>' +
        '<div class="call-info">' +
          '<div class="call-table">' + (c.table || '未知') + '桌</div>' +
          '<div class="call-type">' + (c.call_type_label || '其他问题') + '</div>' +
          '<div class="call-time">' + time + ' · ' + (c.phone_masked || c.phone || '') + '</div>' +
        '</div>' +
        (isResolved 
          ? '<div class="resolved-badge">✅ 已处理</div>'
          : '<button class="resolve-btn" onclick="resolveCall(\'' + c.id + '\')">标记处理</button>') +
      '</div>';
    }).join('');
  });
}

function resolveCall(callId) {
  const formData = new FormData();
  formData.append('call_id', callId);
  formData.append('token', TOKEN);
  fetch(API_BASE + '/calls/resolve', { method: 'POST', body: formData })
    .then(r => r.json()).then(d => {
      if (d.ok) loadData();
    });
}
</script>
</body>
</html>
